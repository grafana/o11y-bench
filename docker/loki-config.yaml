# Minimal Loki config for single-node deployment (no memberlist/clustering)
auth_enabled: false

# Run all components in single process
target: all

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  # Workaround for interface discovery issues (github.com/grafana/loki/issues/19381)
  instance_addr: 127.0.0.1
  instance_interface_names: []

# Force memberlist to use explicit IP instead of interface discovery
memberlist:
  bind_addr:
    - 127.0.0.1
  advertise_addr: 127.0.0.1
  abort_if_cluster_join_fails: false
  join_members: []

# Query frontend - use explicit address
frontend:
  address: 127.0.0.1

# Fast startup: minimize lifecycler delays
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    address: 127.0.0.1
    interface_names: []
    # Fast ring registration for single-node
    min_ready_duration: 0s
    final_sleep: 0s
  # Flush chunks quickly for faster data availability
  chunk_idle_period: 5m
  chunk_retain_period: 30s

distributor:
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

limits_config:
  reject_old_samples: false
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: false
