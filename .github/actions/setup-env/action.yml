name: CI Environment
description: Install uv, Python, optional mise, and sync dependencies

inputs:
  save-cache:
    description: Save uv cache after the job completes
    required: false
    default: "false"
  install-mise:
    description: Install mise for jobs that run `mise run`
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install uv and Python
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        cache-python: true
        python-version: "3.14"
        save-cache: ${{ inputs.save-cache }}

    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      if: ${{ inputs.install-mise == 'true' }}
      with:
        cache: false
        install: false

    - name: Install project dependencies
      run: uv sync --locked --all-groups
      shell: bash
