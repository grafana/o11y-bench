<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>o11y-bench — Comparison Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">o11y-bench Comparison</h1>
      <p class="mt-1 text-sm text-gray-500">{n_runs} runs · {n_tasks} tasks</p>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 p-4 mb-6">
      <table class="w-full">
        <thead><tr class="border-b border-gray-200">
          <th class="py-2 px-3 text-xs text-left text-gray-400 font-medium">Metric</th>
          {header_cols}
        </tr></thead>
        <tbody>{summary_rows}</tbody>
      </table>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 p-4 mb-6">
      <h2 class="text-sm font-semibold text-gray-700 mb-3">Per-Task Results</h2>
      <table class="w-full">
        <thead><tr class="border-b border-gray-200">
          <th class="py-2 px-3 text-xs text-left text-gray-400 font-medium">Task</th>
          {header_cols}
        </tr></thead>
        <tbody>{task_rows}</tbody>
      </table>
    </div>

    <p class="text-center text-xs text-gray-400 py-4 border-t border-gray-200">
      Generated by o11y-bench · Harbor framework
    </p>

  </div>
</body>
</html>
