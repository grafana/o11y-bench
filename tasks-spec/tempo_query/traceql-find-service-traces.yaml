id: traceql-find-service-traces
category: tempo_query
tags:
- traceql
- traces
- service
- tempo
statement: |
  What do recent order-service requests look like in tracing? A trace id would be great if you
  find one, plus whatever quick read you get from it.
checks:
- weight: 85
  type: grounding
  params:
    prefix_min_chars: 8
    mode: tool_trace_id
  name: Response cites a trace ID that appears in Tempo tool results
rubric:
- criterion: The final response includes at least one trace identifier and describes what appears inside that trace
  weight: 10.0
- criterion: 'Satisfied if the final response summarizes traces with **any** of: approximate count, representative latencies, or error status breakdown'
  weight: 5.0
- criterion: The final response names order-service and references tracing (trace id, spans, or Tempo results)
  weight: 15.0
