id: traceql-error-chain-orders
category: tempo_query
tags:
- traceql
- errors
- traces
- service-chain
- tempo
statement: |
  Can you pull a failing POST /api/orders trace from roughly the last day? I'd love a trace id if
  you have one, how the request moved through services, and where it first looks wrong.
checks:
- weight: 70
  type: grounding
  params:
    prefix_min_chars: 8
    mode: tool_trace_id
  name: Response cites a trace ID that appears in Tempo tool results
rubric:
- criterion: The final response points to the first service or span in the chain where the error originates
  weight: 5.0
- criterion: The final response ties the analysis to POST /api/orders or checkout flow wording
  weight: 15.0
- criterion: The final response explains how the error moves across services (propagation, upstream/downstream, or root vs symptom)
  weight: 15.0
- criterion: Any asserted failing service or hop in the final answer appears in trace or tool output in the transcript
  weight: 15.0
