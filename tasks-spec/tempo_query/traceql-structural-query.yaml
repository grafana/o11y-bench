id: traceql-structural-query
category: tempo_query
tags:
- traceql
- traces
- structural
- parent-child
- tempo
statement: |
  When someone goes through checkout, what does order-service call underneath it? Name the
  downstream pieces you see, walk me through the call chain / parent-child flow, and flag any
  that look unusually slow. Include a trace id for one concrete trace if you find one.
checks:
- weight: 50
  type: grounding
  params:
    prefix_min_chars: 8
    mode: tool_trace_id
  name: Response cites a trace ID that appears in Tempo tool results
rubric:
- criterion: The final response states downstream call durations or latencies taken from trace spans
  weight: 15.0
- criterion: The final response explains how parent spans relate to child spans (call chain or dependency direction)
  weight: 10.0
- criterion: The final response describes call structure (parent/child, TraceQL operators, or plain downstream/upstream/dependency wording)
  weight: 25.0
- criterion: The final response names concrete services, spans, or trace hops from the investigation
  weight: 25.0
