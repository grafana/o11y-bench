id: traceql-error-span-analysis
category: tempo_query
tags:
- traceql
- traces
- errors
- span
- tempo
statement: |
  Where are we seeing error spans in distributed traces over roughly the last day? Which services
  show up and what operations are failing? If you can point to a specific trace - pasting an id is
  perfect - I can follow up on it myself.
checks:
- weight: 75
  type: grounding
  params:
    prefix_min_chars: 8
    assistant_scope: all
    mode: tool_trace_id
  name: Response cites a trace ID that appears in Tempo tool results
rubric:
- criterion: The final response discusses span-level evidence (span name, attribute, or status code - not only HTTP or service names)
  weight: 25.0
